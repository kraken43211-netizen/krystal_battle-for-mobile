<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crystal Battle Mobile - DMG FIXED</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; user-select: none; touch-action: none; color: #0ff; }
        canvas { display: block; }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); z-index: 20; text-align: center;}
        .hidden { display: none !important; }
        button { background: transparent; border: 2px solid #0ff; color: #0ff; padding: 10px 30px; font-size: 1.2em; margin: 10px; cursor: pointer; text-transform: uppercase; }
        button:hover, button.active { background: #0ff; color: #000; box-shadow: 0 0 20px #0ff; }
        #ui-layer { position: absolute; top: 10px; left: 10px; z-index: 10; pointer-events: none; font-size: 20px; text-shadow: 0 0 5px #0ff; }
        #radar { position: absolute; top: 10px; right: 10px; width: 120px; height: 120px; border: 2px solid #0ff; border-radius: 50%; background: rgba(0,20,20,0.8); z-index: 10; overflow: hidden; }
        .signature { position: absolute; bottom: 5px; right: 5px; color: rgba(0,255,255,0.4); font-size: 10px; }
    </style>
</head>
<body>

<div id="ui-layer" class="hidden">
    <div style="color: #0ff;">HP: <span id="hp-val">100</span></div>
    <div style="color: #f0f;">SCORE: <span id="score-val">0</span></div>
</div>

<div id="radar" class="hidden"><canvas id="radar-canvas" width="120" height="120"></canvas></div>

<div id="menu-screen" class="screen">
    <h1>CRYSTAL BATTLE</h1>
    <div style="margin: 20px;">
        <p>СЛОЖНОСТЬ:</p>
        <button class="diff-btn active" data-diff="1">ЛЕГКО</button>
        <button class="diff-btn" data-diff="2">НОРМА</button>
        <button class="diff-btn" data-diff="3">ХАРД</button>
    </div>
    <div style="margin: 20px;">
        <p>КАРТА:</p>
        <button class="map-btn active" data-map="empty">ПУСТОШЬ</button>
        <button class="map-btn" data-map="lab">ЛАБИРИНТ</button>
    </div>
    <button id="start-btn" style="border-color: #f0f; color: #f0f; font-size: 1.5em;">ИГРАТЬ</button>
</div>

<div id="go-screen" class="screen hidden">
    <h1 style="color: #f00;">GAME OVER</h1>
    <p>СЧЕТ: <span id="final-score">0</span></p>
    <button id="restart-btn">В МЕНЮ</button>
</div>

<div class="signature">by Кирилл Пьяничук</div>
<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const radarCanvas = document.getElementById('radar-canvas');
    const radarCtx = radarCanvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let gameActive = false;
    let score = 0;
    let difficulty = 1;
    let currentMap = 'empty';
    let worldSize = 2000;
    let player = { x: 1000, y: 1000, hp: 100, radius: 20, speed: 5, color: '#0ff', flash: 0 };
    let enemies = [];
    let playerBullets = [];
    let enemyBullets = [];
    let walls = [];
    let joysticks = { left: { active: false, x: 0, y: 0, sx: 0, sy: 0, id: -1 }, right: { active: false, x: 0, y: 0, sx: 0, sy: 0, id: -1, angle: 0 } };

    function initWalls() {
        walls = [{x:0, y:0, w:worldSize, h:10}, {x:0, y:worldSize-10, w:worldSize, h:10}, {x:0, y:0, w:10, h:worldSize}, {x:worldSize-10, y:0, w:10, h:worldSize}];
        if(currentMap === 'lab') {
            for(let i=0; i<12; i++) walls.push({x: Math.random()*1500, y: Math.random()*1500, w: 200, h: 20});
        }
    }

    // ТАЧИ
    window.addEventListener('touchstart', e => {
        if(!gameActive) return;
        for(let t of e.changedTouches) {
            if(t.clientX < canvas.width/2) { joysticks.left.active = true; joysticks.left.sx = t.clientX; joysticks.left.sy = t.clientY; joysticks.left.id = t.identifier; }
            else { joysticks.right.active = true; joysticks.right.sx = t.clientX; joysticks.right.sy = t.clientY; joysticks.right.id = t.identifier; }
        }
    });

    window.addEventListener('touchmove', e => {
        for(let t of e.changedTouches) {
            if(t.identifier === joysticks.left.id) { joysticks.left.x = t.clientX - joysticks.left.sx; joysticks.left.y = t.clientY - joysticks.left.sy; }
            if(t.identifier === joysticks.right.id) { 
                joysticks.right.x = t.clientX - joysticks.right.sx; joysticks.right.y = t.clientY - joysticks.right.sy; 
                joysticks.right.angle = Math.atan2(joysticks.right.y, joysticks.right.x);
            }
        }
    });

    window.addEventListener('touchend', e => {
        for(let t of e.changedTouches) {
            if(t.identifier === joysticks.left.id) { joysticks.left.active = false; joysticks.left.x = joysticks.left.y = 0; joysticks.left.id = -1; }
            if(t.identifier === joysticks.right.id) { joysticks.right.active = false; joysticks.right.x = joysticks.right.y = 0; joysticks.right.id = -1; }
        }
    });

    function spawnEnemy() {
        if(!gameActive) return;
        let x = Math.random() * worldSize;
        let y = Math.random() * worldSize;
        if(Math.hypot(x-player.x, y-player.y) > 400) {
            enemies.push({x, y, hp: 40, lastShot: 0, speed: 1 + difficulty});
        }
    }
    setInterval(spawnEnemy, 2000);

    function update() {
        if(!gameActive) return;

        // Движение
        if(joysticks.left.active) {
            let d = Math.hypot(joysticks.left.x, joysticks.left.y);
            if(d > 5) {
                let nx = player.x + (joysticks.left.x/d)*player.speed;
                let ny = player.y + (joysticks.left.y/d)*player.speed;
                let colX = false, colY = false;
                walls.forEach(w => {
                    if(nx+player.radius > w.x && nx-player.radius < w.x+w.w && player.y+player.radius > w.y && player.y-player.radius < w.y+w.h) colX = true;
                    if(player.x+player.radius > w.x && player.x-player.radius < w.x+w.w && ny+player.radius > w.y && ny-player.radius < w.y+w.h) colY = true;
                });
                if(!colX) player.x = nx;
                if(!colY) player.y = ny;
            }
        }

        // Стрельба игрока
        if(joysticks.right.active && Date.now() % 15 === 0) {
            playerBullets.push({x: player.x, y: player.y, vx: Math.cos(joysticks.right.angle)*8, vy: Math.sin(joysticks.right.angle)*8});
        }

        // ПУЛИ ВРАГОВ И УРОН ПО ИГРОКУ (ГЛАВНОЕ!)
        enemyBullets.forEach((b, i) => {
            b.x += b.vx; b.y += b.vy;
            let dist = Math.hypot(b.x - player.x, b.y - player.y);
            if(dist < player.radius) {
                player.hp -= 10 * difficulty; // Урон растет от сложности
                player.flash = 5; // Мигание при уроне
                enemyBullets.splice(i, 1);
                document.getElementById('hp-val').innerText = Math.max(0, player.hp);
                if(player.hp <= 0) { gameActive = false; document.getElementById('go-screen').classList.remove('hidden'); document.getElementById('final-score').innerText = score; }
            }
            // Удаление при вылете за мир
            if(b.x < 0 || b.x > worldSize || b.y < 0 || b.y > worldSize) enemyBullets.splice(i, 1);
        });

        // Враги
        enemies.forEach((en, ei) => {
            let d = Math.hypot(player.x - en.x, player.y - en.y);
            en.x += ((player.x - en.x)/d) * en.speed;
            en.y += ((player.y - en.y)/d) * en.speed;

            if(d < 400 && Date.now() - en.lastShot > 2000 / difficulty) {
                enemyBullets.push({x: en.x, y: en.y, vx: ((player.x - en.x)/d)*5, vy: ((player.y - en.y)/d)*5});
                en.lastShot = Date.now();
            }

            playerBullets.forEach((pb, pbi) => {
                if(Math.hypot(pb.x - en.x, pb.y - en.y) < 20) {
                    enemies.splice(ei, 1); playerBullets.splice(pbi, 1); score += 10;
                    document.getElementById('score-val').innerText = score;
                }
            });
        });

        playerBullets.forEach((b, i) => { b.x += b.vx; b.y += b.vy; if(b.x<0||b.x>worldSize||b.y<0||b.y>worldSize) playerBullets.splice(i,1); });

        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.save();
        ctx.translate(-player.x + canvas.width/2, -player.y + canvas.height/2);

        // Стены
        ctx.fillStyle = '#222'; ctx.strokeStyle = '#0ff';
        walls.forEach(w => { ctx.fillRect(w.x, w.y, w.w, w.h); ctx.strokeRect(w.x, w.y, w.w, w.h); });

        // Игрок (краснеет при уроне)
        ctx.fillStyle = player.flash > 0 ? '#f00' : '#0ff';
        if(player.flash > 0) player.flash--;
        ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2); ctx.fill();
        
        // Пушка игрока
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(player.x, player.y);
        ctx.lineTo(player.x + Math.cos(joysticks.right.angle)*30, player.y + Math.sin(joysticks.right.angle)*30);
        ctx.stroke();

        // Враги
        ctx.fillStyle = '#f0f';
        enemies.forEach(en => { ctx.beginPath(); ctx.arc(en.x, en.y, 15, 0, Math.PI*2); ctx.fill(); });

        // Пули
        ctx.fillStyle = '#fff'; playerBullets.forEach(b => ctx.fillRect(b.x, b.y, 5, 5));
        ctx.fillStyle = '#f00'; enemyBullets.forEach(b => ctx.fillRect(b.x, b.y, 8, 8)); // ПУЛИ ВРАГОВ ТЕПЕРЬ БОЛЬШИЕ

        ctx.restore();

        // РАДАР
        drawRadar();

        // Джойстики
        if(joysticks.left.active) drawJoy(joysticks.left.sx, joysticks.left.sy, joysticks.left.x, joysticks.left.y);
        if(joysticks.right.active) drawJoy(joysticks.right.sx, joysticks.right.sy, joysticks.right.x, joysticks.right.y);
    }

    function drawJoy(sx, sy, x, y) {
        ctx.strokeStyle = 'rgba(0,255,255,0.3)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(sx, sy, 50, 0, Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.arc(sx+x, sy+y, 25, 0, Math.PI*2); ctx.stroke();
    }

    function drawRadar() {
        radarCtx.fillStyle = 'rgba(0,20,20,0.8)'; radarCtx.fillRect(0,0,120,120);
        let s = 120 / worldSize;
        radarCtx.fillStyle = '#0ff'; radarCtx.fillRect(player.x*s-2, player.y*s-2, 4, 4);
        radarCtx.fillStyle = '#f00'; enemies.forEach(en => radarCtx.fillRect(en.x*s-1, en.y*s-1, 2, 2));
        radarCtx.strokeStyle = 'rgba(0,255,255,0.2)'; walls.forEach(w => radarCtx.strokeRect(w.x*s, w.y*s, w.w*s, w.h*s));
    }

    document.querySelectorAll('.diff-btn').forEach(b => b.onclick = () => {
        document.querySelectorAll('.diff-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active'); difficulty = parseInt(b.dataset.diff);
    });
    document.querySelectorAll('.map-btn').forEach(b => b.onclick = () => {
        document.querySelectorAll('.map-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active'); currentMap = b.dataset.map;
    });

    document.getElementById('start-btn').onclick = () => {
        gameActive = true; score = 0; player.hp = 100; enemies = []; playerBullets = []; enemyBullets = [];
        initWalls();
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('ui-layer').classList.remove('hidden');
        document.getElementById('radar').classList.remove('hidden');
        update();
    };
    document.getElementById('restart-btn').onclick = () => {
        location.reload();
    };

</script>
</body>
</html>
