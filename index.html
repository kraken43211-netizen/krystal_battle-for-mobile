<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Crystal Battle: In-Game Shop</title>
    <style>
        * { box-sizing: border-box; touch-action: none; -webkit-user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1a1a1a; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(10,10,10,0.9); z-index: 100; color: #ddd; }
        .hidden { display: none !important; }
        
        /* Кнопка Магазина в бою */
        #shop-toggle-btn { position: absolute; top: 110px; left: 20px; z-index: 70; background: #f0f; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; pointer-events: auto; }

        /* Окно Магазина */
        #shop-modal { background: #111; border: 2px solid #f0f; border-radius: 15px; width: 90%; max-width: 450px; max-height: 80vh; overflow-y: auto; padding: 20px; z-index: 110; }
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .weapon-item { background: #222; border: 1px solid #444; padding: 8px; border-radius: 8px; text-align: center; }
        .weapon-item.selected { border-color: #f0f; box-shadow: 0 0 8px #f0f; }
        .weapon-item h3 { font-size: 13px; margin: 5px 0; color: #f0f; }
        .buy-btn { background: #444; border: none; color: #fff; padding: 6px; border-radius: 4px; width: 100%; font-size: 12px; }
        .buy-btn.can-buy { background: #2ecc71; }

        button.main-btn { background: #f0f; border: none; color: #fff; padding: 15px 40px; font-weight: bold; border-radius: 8px; font-size: 18px; }

        #ui-layer { position: absolute; top: 20px; left: 20px; z-index: 50; color: #eee; pointer-events: none; }
        #xp-bar { width: 150px; height: 8px; border: 1px solid #555; background: #222; margin-top: 5px; border-radius: 4px; overflow: hidden; }
        #xp-fill { width: 0%; height: 100%; background: #f0f; transition: 0.3s; }
        
        #radar { position: absolute; top: 20px; right: 20px; width: 100px; height: 100px; border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; background: rgba(0,0,0,0.5); z-index: 60; }
        .sig { position: absolute; bottom: 10px; right: 15px; color: rgba(255,255,255,0.2); font-size: 11px; }
    </style>
</head>
<body>

<div id="m-screen" class="screen">
    <h1 style="color: #f0f; margin-bottom: 5px;">CRYSTAL BATTLE</h1>
    <p style="color: #666; margin-bottom: 25px;">by Кирилл Пьяничук</p>
    <button id="start-btn" class="main-btn">НАЧАТЬ ИГРУ</button>
</div>

<div id="shop-overlay" class="screen hidden">
    <div id="shop-modal">
        <h2 style="color: #f0f; margin: 0; text-align: center;">SHOP</h2>
        <p style="text-align: center;">Crystals: <span id="shop-money">0</span> 💎</p>
        <div class="shop-grid" id="shop-grid"></div>
        <button class="main-btn" onclick="toggleShop()" style="width:100%; margin-top:15px; padding: 10px;">В БОЙ!</button>
    </div>
</div>

<div id="ui-layer" class="hidden">
    <div style="font-size: 20px; font-weight: bold;">HP: <span id="h-v">100</span> | 💎: <span id="m-v">0</span></div>
    <div id="xp-bar"><div id="xp-fill"></div></div>
    <div style="font-size: 11px; margin-top: 3px;">LEVEL: <span id="l-v">1</span> | <span id="cur-w-name">Pistol</span></div>
    <button id="shop-toggle-btn" onclick="toggleShop()">SHOP 💎</button>
</div>

<div id="radar" class="hidden"><canvas id="radarCanvas" width="100" height="100"></canvas></div>
<div class="sig">by Кирилл Пьяничук</div>
<canvas id="gC"></canvas>

<script>
    const canvas = document.getElementById('gC'), ctx = canvas.getContext('2d');
    const rCanvas = document.getElementById('radarCanvas'), rCtx = rCanvas.getContext('2d');
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playShootSound(type) {
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if(type === 'player') { osc.type = 'square'; osc.frequency.setValueAtTime(160, audioCtx.currentTime); gain.gain.setValueAtTime(0.08, audioCtx.currentTime); }
        else { osc.type = 'sine'; osc.frequency.setValueAtTime(100, audioCtx.currentTime); gain.gain.setValueAtTime(0.04, audioCtx.currentTime); }
        osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    let gameActive = false, isPaused = false, worldSize = 3000, zoom = 0.6;
    let money = 0, xp = 0, level = 1;
    let player = { x: 1500, y: 1500, hp: 100, maxHp: 100, r: 24, lastS: 0, weaponIdx: 0 };
    let enemies = [], bullets = [], eBullets = [], obstacles = [];
    let joyL = { active: false, x: 0, y: 0, sx: 0, sy: 0, id: -1 };
    let joyR = { active: false, x: 0, y: 0, sx: 0, sy: 0, id: -1, a: 0 };

    const weapons = [
        { n: "Glock-18", dmg: 20, spd: 250, price: 0, color: "#fff", owned: true },
        { n: "Deagle", dmg: 55, spd: 550, price: 150, color: "#f1c40f", owned: false },
        { n: "MP5", dmg: 18, spd: 110, price: 300, color: "#3498db", owned: false },
        { n: "AK-47", dmg: 40, spd: 160, price: 600, color: "#e67e22", owned: false },
        { n: "M4A1", dmg: 35, spd: 130, price: 900, color: "#2ecc71", owned: false },
        { n: "AWP", dmg: 250, spd: 1300, price: 1500, color: "#9b59b6", owned: false },
        { n: "P90", dmg: 14, spd: 75, price: 2000, color: "#1abc9c", owned: false },
        { n: "Plasma", dmg: 50, spd: 220, price: 3500, color: "#00ffff", owned: false },
        { n: "Minigun", dmg: 28, spd: 55, price: 6000, color: "#e74c3c", owned: false },
        { n: "BFG-9000", dmg: 600, spd: 1100, price: 12000, color: "#f0f", owned: false }
    ];

    function updateShopUI() {
        const grid = document.getElementById('shop-grid');
        document.getElementById('shop-money').innerText = money;
        grid.innerHTML = '';
        weapons.forEach((w, i) => {
            const div = document.createElement('div');
            div.className = `weapon-item ${player.weaponIdx === i ? 'selected' : ''}`;
            div.innerHTML = `
                <h3>${w.n}</h3>
                ${w.owned ? `<button class="buy-btn" style="background:#555" onclick="selectW(${i})">SELECT</button>` : 
                `<button class="buy-btn ${money >= w.price ? 'can-buy' : ''}" onclick="buyW(${i})">${w.price} 💎</button>`}
            `;
            grid.appendChild(div);
        });
    }

    function buyW(i) { if(money >= weapons[i].price) { money -= weapons[i].price; weapons[i].owned = true; selectW(i); } }
    function selectW(i) { player.weaponIdx = i; updateShopUI(); }
    function toggleShop() { 
        isPaused = !isPaused; 
        document.getElementById('shop-overlay').classList.toggle('hidden'); 
        if(isPaused) updateShopUI();
    }

    function generateObstacles() {
        obstacles = [];
        for(let i=0; i<30; i++) obstacles.push({ x: Math.random()*(worldSize-600)+300, y: Math.random()*(worldSize-600)+300, w: 140, h: 140 });
    }

    function isColliding(nx, ny, r) {
        if(nx < r || nx > worldSize-r || ny < r || ny > worldSize-r) return true;
        for(let o of obstacles) if(nx + r > o.x && nx - r < o.x + o.w && ny + r > o.y && ny - r < o.y + o.h) return true;
        return false;
    }

    function draw() {
        if (!gameActive) return;
        ctx.setTransform(1,0,0,1,0,0);
        ctx.fillStyle = "#111"; ctx.fillRect(0,0,canvas.width,canvas.height);
        if(!isPaused) {
            ctx.translate(canvas.width/2, canvas.height/2);
            ctx.scale(zoom, zoom); ctx.translate(-player.x, -player.y);
            ctx.fillStyle = "#bd9f7a"; ctx.fillRect(0,0,worldSize,worldSize);
            ctx.fillStyle = "#705b44"; obstacles.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));
            bullets.forEach(b => { ctx.fillStyle = weapons[player.weaponIdx].color; ctx.beginPath(); ctx.arc(b.x, b.y, 7, 0, Math.PI*2); ctx.fill(); });
            ctx.fillStyle = "#f33"; eBullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 6, 0, Math.PI*2); ctx.fill(); });
            enemies.forEach(e => {
                ctx.save(); ctx.translate(e.x, e.y); ctx.rotate(Math.atan2(player.y-e.y, player.x-e.x));
                ctx.fillStyle = "#333"; ctx.fillRect(15, -5, 25, 10); ctx.restore();
                ctx.fillStyle = "#8e44ad"; ctx.beginPath(); ctx.arc(e.x, e.y, 22, 0, Math.PI*2); ctx.fill();
            });
            ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(joyR.a);
            ctx.fillStyle = "#000"; ctx.fillRect(20, -7, 35, 14); ctx.restore();
            ctx.fillStyle = "#2c3e50"; ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 3; ctx.stroke();
            ctx.setTransform(1,0,0,1,0,0);
            if (joyL.active) drawJ(joyL); if (joyR.active) drawJ(joyR);
            drawRadar(); updateUI();
        }
        requestAnimationFrame(draw);
    }

    function drawJ(j) {
        ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.beginPath(); ctx.arc(j.sx, j.sy, 55, 0, Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.arc(j.sx+j.x, j.sy+j.y, 20, 0, Math.PI*2); ctx.stroke();
    }

    function drawRadar() {
        rCtx.clearRect(0,0,100,100);
        enemies.forEach(e => {
            let rx = 50 + (e.x - player.x)/50; let ry = 50 + (e.y - player.y)/50;
            if(Math.hypot(rx-50, ry-50) < 48) { rCtx.fillStyle = "red"; rCtx.beginPath(); rCtx.arc(rx, ry, 3, 0, Math.PI*2); rCtx.fill(); }
        });
        rCtx.fillStyle = "#fff"; rCtx.beginPath(); rCtx.arc(50, 50, 4, 0, Math.PI*2); rCtx.fill();
    }

    function updateUI() {
        document.getElementById('h-v').innerText = Math.ceil(player.hp);
        document.getElementById('m-v').innerText = money;
        document.getElementById('l-v').innerText = level;
        document.getElementById('xp-fill').style.width = xp + "%";
        document.getElementById('cur-w-name').innerText = weapons[player.weaponIdx].n;
    }

    function gameLoop() {
        if (!gameActive || isPaused) { setTimeout(gameLoop, 16); return; }
        if (joyL.active) {
            let d = Math.hypot(joyL.x, joyL.y);
            let vx = (joyL.x/d)*8, vy = (joyL.y/d)*8;
            if(!isColliding(player.x + vx, player.y, player.r)) player.x += vx;
            if(!isColliding(player.x, player.y + vy, player.r)) player.y += vy;
        }
        const curW = weapons[player.weaponIdx];
        if (joyR.active && Date.now() - player.lastS > curW.spd) {
            bullets.push({x: player.x, y: player.y, vx: Math.cos(joyR.a)*18, vy: Math.sin(joyR.a)*18, dmg: curW.dmg});
            player.lastS = Date.now(); playShootSound('player');
        }
        bullets.forEach((b, i) => { b.x += b.vx; b.y += b.vy; if(isColliding(b.x, b.y, 5)) bullets.splice(i,1); });
        eBullets.forEach((b, i) => { 
            b.x += b.vx; b.y += b.vy; 
            if(Math.hypot(b.x-player.x, b.y-player.y) < player.r) { player.hp -= (8 + level); eBullets.splice(i,1); }
            if(isColliding(b.x, b.y, 5)) eBullets.splice(i,1); 
        });
        if (Math.random() < (0.01 + level*0.002) && enemies.length < 15) {
            let sx = Math.random()*worldSize, sy = Math.random()*worldSize;
            if(!isColliding(sx, sy, 30)) enemies.push({x: sx, y: sy, hp: 50+(level*15), lastShot: 0});
        }
        enemies.forEach((e, i) => {
            let dist = Math.hypot(player.x - e.x, player.y - e.y);
            if(dist > 250) {
                let evx = (player.x - e.x)/dist * (4 + level/2), evy = (player.y - e.y)/dist * (4 + level/2);
                if(!isColliding(e.x + evx, e.y, 22)) e.x += evx;
                if(!isColliding(e.x, e.y + evy, 22)) e.y += evy;
            } else if (Date.now() - e.lastShot > 1400) {
                let ang = Math.atan2(player.y-e.y, player.x-e.x);
                eBullets.push({x: e.x, y: e.y, vx: Math.cos(ang)*11, vy: Math.sin(ang)*11});
                e.lastShot = Date.now(); playShootSound('enemy');
            }
            bullets.forEach((b, bi) => {
                if(Math.hypot(b.x-e.x, b.y-e.y) < 28) { 
                    e.hp -= b.dmg; bullets.splice(bi,1); 
                    if(e.hp<=0) { enemies.splice(i,1); money+=20; xp+=25; if(xp>=100){xp=0; level++; player.hp=player.maxHp;} }
                }
            });
        });
        if(player.hp <= 0) location.reload();
        setTimeout(gameLoop, 16);
    }

    window.addEventListener('touchstart', e => {
        audioCtx.resume();
        for(let t of e.changedTouches) {
            if(isPaused) return;
            if(t.clientX < window.innerWidth/2 && joyL.id === -1) { joyL.active=true; joyL.sx=t.clientX; joyL.sy=t.clientY; joyL.id=t.identifier; }
            else if(joyR.id === -1) { joyR.active=true; joyR.sx=t.clientX; joyR.sy=t.clientY; joyR.id=t.identifier; }
        }
    });
    window.addEventListener('touchmove', e => {
        for(let t of e.changedTouches) {
            if(t.identifier === joyL.id) { let d = Math.hypot(t.clientX-joyL.sx, t.clientY-joyL.sy); let lim = Math.min(d, 50); joyL.x=(t.clientX-joyL.sx)/d*lim; joyL.y=(t.clientY-joyL.sy)/d*lim; }
            if(t.identifier === joyR.id) { let d = Math.hypot(t.clientX-joyR.sx, t.clientY-joyR.sy); let lim = Math.min(d, 50); joyR.x=(t.clientX-joyR.sx)/d*lim; joyR.y=(t.clientY-joyR.sy)/d*lim; joyR.a=Math.atan2(joyR.y, joyR.x); }
        }
    });
    window.addEventListener('touchend', e => {
        for(let t of e.changedTouches) { if(t.identifier === joyL.id) { joyL.active=false; joyL.id=-1; } if(t.identifier === joyR.id) { joyR.active=false; joyR.id=-1; } }
    });

    document.getElementById('start-btn').onclick = () => {
        document.getElementById('m-screen').classList.add('hidden');
        document.getElementById('ui-layer').classList.remove('hidden');
        document.getElementById('radar').classList.remove('hidden');
        generateObstacles(); canvas.width=window.innerWidth; canvas.height=window.innerHeight;
        gameActive = true; draw(); gameLoop();
    };
</script>
</body>
</html>
