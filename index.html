<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crystal Battle - Full Mobile</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; user-select: none; touch-action: none; color: #0ff; }
        canvas { display: block; }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.95); z-index: 100; text-align: center;}
        .hidden { display: none !important; }
        h1 { font-size: 2.5em; text-shadow: 0 0 15px #0ff; margin-bottom: 10px; }
        button { background: transparent; border: 2px solid #0ff; color: #0ff; padding: 10px 25px; font-size: 1.1em; margin: 8px; cursor: pointer; text-transform: uppercase; }
        button:active, button.active { background: #0ff; color: #000; box-shadow: 0 0 20px #0ff; }
        #ui-layer { position: absolute; top: 10px; left: 10px; z-index: 50; pointer-events: none; text-shadow: 0 0 5px #0ff; font-size: 18px; font-weight: bold;}
        #radar { position: absolute; top: 10px; right: 10px; width: 110px; height: 110px; border: 2px solid #0ff; border-radius: 50%; background: rgba(0,20,20,0.8); z-index: 50; overflow: hidden; }
        .signature { position: absolute; bottom: 5px; right: 5px; color: rgba(0,255,255,0.4); font-size: 10px; z-index: 50;}
        
        /* Предупреждение о повороте экрана */
        #orientation-warning { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #fff; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; text-align: center; }
        @media screen and (orientation: portrait) { #orientation-warning { display: flex; } }
    </style>
</head>
<body>

<!-- Предупреждение -->
<div id="orientation-warning">
    <h2>ПОЖАЛУЙСТА, ПЕРЕВЕРНИТЕ ТЕЛЕФОН</h2>
    <p>Для игры нужен ландшафтный режим</p>
</div>

<!-- Звуки -->
<audio id="snd-shot" src="shot.mp3" preload="auto"></audio>
<audio id="snd-expl" src="explosion.mp3" preload="auto"></audio>
<audio id="snd-go" src="gameover.mp3" preload="auto"></audio>

<!-- UI -->
<div id="ui-layer" class="hidden">
    <div>HP: <span id="hp-val">100</span></div>
    <div>СЧЕТ: <span id="score-val">0</span></div>
</div>

<div id="radar" class="hidden"><canvas id="radar-canvas" width="110" height="110"></canvas></div>

<!-- Меню -->
<div id="menu-screen" class="screen">
    <h1>CRYSTAL BATTLE</h1>
    <div style="margin-bottom: 15px;">
        <p>СЛОЖНОСТЬ:</p>
        <button class="diff-btn active" data-diff="1">ЛЕГКО</button>
        <button class="diff-btn" data-diff="2">НОРМА</button>
        <button class="diff-btn" data-diff="3">ХАРД</button>
    </div>
    <div style="margin-bottom: 15px;">
        <p>КАРТА:</p>
        <button class="map-btn active" data-map="empty">ПУСТОШЬ</button>
        <button class="map-btn" data-map="lab">ЛАБИРИНТ</button>
    </div>
    <button id="start-btn" style="border-color: #f0f; color: #f0f; font-size: 1.4em;">ИГРАТЬ</button>
</div>

<!-- Game Over -->
<div id="go-screen" class="screen hidden">
    <h1 style="color: #f00;">GAME OVER</h1>
    <p>ВАШ РЕЗУЛЬТАТ: <span id="final-score">0</span></p>
    <button onclick="location.reload()">В МЕНЮ</button>
</div>

<div class="signature">by Кирилл Пьяничук</div>
<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const radarCanvas = document.getElementById('radar-canvas');
    const rctx = radarCanvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Звуки
    const sndShot = document.getElementById('snd-shot');
    const sndExpl = document.getElementById('snd-expl');
    const sndGo = document.getElementById('snd-go');

    function playSnd(s) { s.currentTime = 0; s.play().catch(()=>{}); }

    // Переменные
    let gameActive = false;
    let score = 0;
    let difficulty = 1;
    let currentMap = 'empty';
    let worldSize = 2500;
    let player = { x: 1250, y: 1250, hp: 100, r: 20, speed: 6, hit: 0 };
    let enemies = [];
    let playerBullets = [];
    let enemyBullets = [];
    let walls = [];

    // Джойстики
    let joyL = { active: false, sx: 0, sy: 0, x: 0, y: 0, id: -1 };
    let joyR = { active: false, sx: 0, sy: 0, x: 0, y: 0, id: -1, angle: 0 };

    function initWalls() {
        walls = [
            {x:0, y:0, w:worldSize, h:15}, {x:0, y:worldSize-15, w:worldSize, h:15},
            {x:0, y:0, w:15, h:worldSize}, {x:worldSize-15, y:0, w:15, h:worldSize}
        ];
        if(currentMap === 'lab') {
            for(let i=0; i<15; i++) {
                walls.push({x: Math.random()*(worldSize-300), y: Math.random()*(worldSize-300), w: 250, h: 25});
            }
        }
    }

    // Тач-управление
    window.addEventListener('touchstart', e => {
        if(!gameActive) return;
        for(let t of e.changedTouches) {
            if(t.clientX < canvas.width/2 && joyL.id === -1) {
                joyL.active = true; joyL.sx = t.clientX; joyL.sy = t.clientY; joyL.id = t.identifier;
            } else if(joyR.id === -1) {
                joyR.active = true; joyR.sx = t.clientX; joyR.sy = t.clientY; joyR.id = t.identifier;
            }
        }
    });

    window.addEventListener('touchmove', e => {
        for(let t of e.changedTouches) {
            if(t.identifier === joyL.id) { joyL.x = t.clientX - joyL.sx; joyL.y = t.clientY - joyL.sy; }
            if(t.identifier === joyR.id) { 
                joyR.x = t.clientX - joyR.sx; joyR.y = t.clientY - joyR.sy; 
                joyR.angle = Math.atan2(joyR.y, joyR.x);
            }
        }
    });

    window.addEventListener('touchend', e => {
        for(let t of e.changedTouches) {
            if(t.identifier === joyL.id) { joyL.active = false; joyL.id = -1; joyL.x = 0; joyL.y = 0; }
            if(t.identifier === joyR.id) { joyR.active = false; joyR.id = -1; joyR.x = 0; joyR.y = 0; }
        }
    });

    function spawnEnemy() {
        if(!gameActive) return;
        let a = Math.random() * Math.PI * 2;
        let d = 600;
        let ex = player.x + Math.cos(a)*d;
        let ey = player.y + Math.sin(a)*d;
        enemies.push({ x: ex, y: ey, hp: 40, lastShot: 0, speed: 1.5 + difficulty*0.5 });
    }
    setInterval(spawnEnemy, 2000);

    function update() {
        if(!gameActive) return;

        // Движение и стены
        if(joyL.active) {
            let d = Math.hypot(joyL.x, joyL.y);
            if(d > 5) {
                let nx = player.x + (joyL.x/d)*player.speed;
                let ny = player.y + (joyL.y/d)*player.speed;
                let colX = false, colY = false;
                walls.forEach(w => {
                    if(nx+player.r > w.x && nx-player.r < w.x+w.w && player.y+player.r > w.y && player.y-player.r < w.y+w.h) colX = true;
                    if(player.x+player.r > w.x && player.x-player.r < w.x+w.w && ny+player.r > w.y && ny-player.r < w.y+w.h) colY = true;
                });
                if(!colX) player.x = nx;
                if(!colY) player.y = ny;
            }
        }

        // Стрельба игрока (моделька пушки)
        if(joyR.active && Date.now() % 12 === 0) {
            playerBullets.push({x: player.x, y: player.y, vx: Math.cos(joyR.angle)*10, vy: Math.sin(joyR.angle)*10});
            playSnd(sndShot);
        }

        // ПРОВЕРКА УРОНА ПО ИГРОКУ
        enemyBullets.forEach((eb, i) => {
            eb.x += eb.vx; eb.y += eb.vy;
            if(Math.hypot(eb.x - player.x, eb.y - player.y) < player.r) {
                player.hp -= 10 * difficulty;
                player.hit = 10;
                enemyBullets.splice(i, 1);
                document.getElementById('hp-val').innerText = Math.max(0, player.hp);
                if(player.hp <= 0) {
                    gameActive = false; playSnd(sndGo);
                    document.getElementById('go-screen').classList.remove('hidden');
                    document.getElementById('final-score').innerText = score;
                }
            }
        });

        // Враги
        enemies.forEach((en, i) => {
            let d = Math.hypot(player.x - en.x, player.y - en.y);
            en.x += ((player.x - en.x)/d) * en.speed;
            en.y += ((player.y - en.y)/d) * en.speed;

            if(d < 500 && Date.now() - en.lastShot > 2000 / difficulty) {
                enemyBullets.push({x: en.x, y: en.y, vx: ((player.x - en.x)/d)*6, vy: ((player.y - en.y)/d)*6});
                en.lastShot = Date.now();
            }

            playerBullets.forEach((pb, pbi) => {
                if(Math.hypot(pb.x - en.x, pb.y - en.y) < 25) {
                    enemies.splice(i, 1); playerBullets.splice(pbi, 1); score += 10;
                    document.getElementById('score-val').innerText = score;
                    playSnd(sndExpl);
                }
            });
        });

        playerBullets.forEach((b, i) => { b.x += b.vx; b.y += b.vy; if(Math.abs(b.x-player.x)>1000) playerBullets.splice(i,1); });

        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.save();
        ctx.translate(-player.x + canvas.width/2, -player.y + canvas.height/2);

        // Мир
        ctx.strokeStyle = '#222'; ctx.strokeRect(0,0,worldSize,worldSize);
        ctx.fillStyle = '#111'; ctx.strokeStyle = '#0ff';
        walls.forEach(w => { ctx.fillRect(w.x, w.y, w.w, w.h); ctx.strokeRect(w.x, w.y, w.w, w.h); });

        // Игрок
        ctx.fillStyle = player.hit > 0 ? '#f00' : '#0ff';
        if(player.hit > 0) player.hit--;
        ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2); ctx.fill();
        
        // Моделька пушки
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 6;
        ctx.beginPath(); ctx.moveTo(player.x, player.y);
        ctx.lineTo(player.x + Math.cos(joyR.angle)*35, player.y + Math.sin(joyR.angle)*35);
        ctx.stroke();

        // Враги
        ctx.fillStyle = '#f0f';
        enemies.forEach(en => { ctx.beginPath(); ctx.arc(en.x, en.y, 16, 0, Math.PI*2); ctx.fill(); });

        // Пули
        ctx.fillStyle = '#fff'; playerBullets.forEach(b => ctx.fillRect(b.x-2, b.y-2, 5, 5));
        ctx.fillStyle = '#f00'; enemyBullets.forEach(b => ctx.fillRect(b.x-3, b.y-3, 8, 8));

        ctx.restore();
        drawRadar();

        if(joyL.active) drawJoy(joyL.sx, joyL.sy, joyL.x, joyL.y);
        if(joyR.active) drawJoy(joyR.sx, joyR.sy, joyR.x, joyR.y);
    }

    function drawJoy(sx, sy, x, y) {
        ctx.strokeStyle = 'rgba(0,255,255,0.4)'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(sx, sy, 50, 0, Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.arc(sx+x, sy+y, 25, 0, Math.PI*2); ctx.stroke();
    }

    function drawRadar() {
        rctx.fillStyle = 'rgba(0,20,20,0.8)'; rctx.fillRect(0,0,110,110);
        let s = 110 / worldSize;
        rctx.fillStyle = '#0ff'; rctx.fillRect(player.x*s-2, player.y*s-2, 4, 4);
        rctx.fillStyle = '#f00'; enemies.forEach(en => rctx.fillRect(en.x*s-1, en.y*s-1, 2, 2));
    }

    // Логика кнопок
    document.querySelectorAll('.diff-btn').forEach(b => b.onclick = () => {
        document.querySelectorAll('.diff-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active'); difficulty = parseInt(b.dataset.diff);
    });
    document.querySelectorAll('.map-btn').forEach(b => b.onclick = () => {
        document.querySelectorAll('.map-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active'); currentMap = b.dataset.map;
    });

    document.getElementById('start-btn').onclick = () => {
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('ui-layer').classList.remove('hidden');
        document.getElementById('radar').classList.remove('hidden');
        gameActive = true; initWalls(); update();
    };
</script>
</body>
</html>
