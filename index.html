<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crystal Battle Mobile</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            touch-action: none;
        }
        canvas {
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #0ff;
            text-shadow: 0 0 5px #0ff;
            pointer-events: none;
        }
        .signature {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: rgba(0, 255, 255, 0.5);
            font-size: 12px;
        }
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #f0f;
            padding: 20px;
            text-align: center;
            color: #f0f;
            display: none;
            z-index: 100;
        }
        button {
            background: #0ff;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <div>HP: <span id="hp-val">100</span></div>
    <div>SCORE: <span id="score-val">0</span></div>
</div>

<div id="game-over">
    <h1>GAME OVER</h1>
    <p>Вас уничтожили боты!</p>
    <button onclick="resetGame()">РЕСТАРТ</button>
</div>

<div class="signature">by Кирилл Пьяничук</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const hpDisplay = document.getElementById('hp-val');
    const scoreDisplay = document.getElementById('score-val');
    const gameOverScreen = document.getElementById('game-over');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let player = {
        x: canvas.width / 2,
        y: canvas.height / 2,
        radius: 20,
        color: '#0ff',
        hp: 100,
        speed: 4
    };

    let score = 0;
    let gameActive = true;
    let enemies = [];
    let playerBullets = [];
    let enemyBullets = [];

    // Джойстики
    let leftJoystick = { active: false, x: 0, y: 0, startX: 0, startY: 0, moveX: 0, moveY: 0 };
    let rightJoystick = { active: false, x: 0, y: 0, startX: 0, startY: 0, moveX: 0, moveY: 0 };

    window.addEventListener('touchstart', e => {
        for (let touch of e.changedTouches) {
            if (touch.clientX < canvas.width / 2) {
                leftJoystick.active = true;
                leftJoystick.startX = touch.clientX;
                leftJoystick.startY = touch.clientY;
                leftJoystick.identifier = touch.identifier;
            } else {
                rightJoystick.active = true;
                rightJoystick.startX = touch.clientX;
                rightJoystick.startY = touch.clientY;
                rightJoystick.identifier = touch.identifier;
            }
        }
    });

    window.addEventListener('touchmove', e => {
        for (let touch of e.changedTouches) {
            if (leftJoystick.active && touch.identifier === leftJoystick.identifier) {
                leftJoystick.moveX = touch.clientX - leftJoystick.startX;
                leftJoystick.moveY = touch.clientY - leftJoystick.startY;
            }
            if (rightJoystick.active && touch.identifier === rightJoystick.identifier) {
                rightJoystick.moveX = touch.clientX - rightJoystick.startX;
                rightJoystick.moveY = touch.clientY - rightJoystick.startY;
            }
        }
    });

    window.addEventListener('touchend', e => {
        for (let touch of e.changedTouches) {
            if (touch.identifier === leftJoystick.identifier) {
                leftJoystick.active = false;
                leftJoystick.moveX = 0;
                leftJoystick.moveY = 0;
            }
            if (touch.identifier === rightJoystick.identifier) {
                rightJoystick.active = false;
                rightJoystick.moveX = 0;
                rightJoystick.moveY = 0;
            }
        }
    });

    function spawnEnemy() {
        if (!gameActive) return;
        const radius = 15;
        let x, y;
        if (Math.random() < 0.5) {
            x = Math.random() < 0.5 ? -radius : canvas.width + radius;
            y = Math.random() * canvas.height;
        } else {
            x = Math.random() * canvas.width;
            y = Math.random() < 0.5 ? -radius : canvas.height + radius;
        }
        enemies.push({ x, y, radius, color: '#f0f', lastShot: 0 });
    }
    setInterval(spawnEnemy, 2000);

    function resetGame() {
        player.hp = 100;
        player.x = canvas.width / 2;
        player.y = canvas.height / 2;
        score = 0;
        enemies = [];
        playerBullets = [];
        enemyBullets = [];
        gameActive = true;
        gameOverScreen.style.display = 'none';
        hpDisplay.innerText = player.hp;
        scoreDisplay.innerText = score;
        requestAnimationFrame(update);
    }

    function update() {
        if (!gameActive) return;

        // Движение игрока
        if (leftJoystick.active) {
            const dist = Math.hypot(leftJoystick.moveX, leftJoystick.moveY);
            if (dist > 5) {
                player.x += (leftJoystick.moveX / dist) * player.speed;
                player.y += (leftJoystick.moveY / dist) * player.speed;
            }
        }

        // Стрельба игрока
        if (rightJoystick.active) {
            const dist = Math.hypot(rightJoystick.moveX, rightJoystick.moveY);
            if (dist > 10 && Date.now() % 10 === 0) {
                playerBullets.push({
                    x: player.x,
                    y: player.y,
                    vx: (rightJoystick.moveX / dist) * 7,
                    vy: (rightJoystick.moveY / dist) * 7
                });
            }
        }

        // Обработка пуль игрока
        playerBullets.forEach((b, bi) => {
            b.x += b.vx; b.y += b.vy;
            enemies.forEach((en, ei) => {
                if (Math.hypot(b.x - en.x, b.y - en.y) < en.radius) {
                    enemies.splice(ei, 1);
                    playerBullets.splice(bi, 1);
                    score += 10;
                    scoreDisplay.innerText = score;
                }
            });
        });

        // Обработка врагов
        enemies.forEach(en => {
            const dist = Math.hypot(player.x - en.x, player.y - en.y);
            en.x += ((player.x - en.x) / dist) * 1.5;
            en.y += ((player.y - en.y) / dist) * 1.5;

            // Стрельба ботов
            if (Date.now() - en.lastShot > 2500) {
                enemyBullets.push({
                    x: en.x, y: en.y,
                    vx: ((player.x - en.x) / dist) * 4,
                    vy: ((player.y - en.y) / dist) * 4
                });
                en.lastShot = Date.now();
            }
        });

        // ПРОВЕРКА УРОНА ПО ИГРОКУ
        enemyBullets.forEach((eb, ebi) => {
            eb.x += eb.vx; eb.y += eb.vy;
            // Если пуля бота попала в игрока
            if (Math.hypot(eb.x - player.x, eb.y - player.y) < player.radius) {
                enemyBullets.splice(ebi, 1);
                player.hp -= 10; // Урон
                hpDisplay.innerText = player.hp;
                if (player.hp <= 0) {
                    gameActive = false;
                    gameOverScreen.style.display = 'block';
                }
            }
        });

        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Игрок
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
        ctx.fillStyle = player.color;
        ctx.fill();
        ctx.shadowBlur = 15; ctx.shadowColor = player.color;

        // Враги
        enemies.forEach(en => {
            ctx.beginPath();
            ctx.arc(en.x, en.y, en.radius, 0, Math.PI * 2);
            ctx.fillStyle = en.color;
            ctx.fill();
            ctx.shadowColor = en.color;
        });

        // Пули
        ctx.fillStyle = '#fff';
        playerBullets.forEach(b => ctx.fillRect(b.x, b.y, 4, 4));
        ctx.fillStyle = '#f00';
        enemyBullets.forEach(b => ctx.fillRect(b.x, b.y, 5, 5));

        // Джойстики (визуально)
        if (leftJoystick.active) drawJoy(leftJoystick);
        if (rightJoystick.active) drawJoy(rightJoystick);
    }

    function drawJoy(j) {
        ctx.strokeStyle = 'rgba(0, 255, 255, 0.3)';
        ctx.beginPath(); ctx.arc(j.startX, j.startY, 40, 0, Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.arc(j.startX + j.moveX, j.startY + j.moveY, 20, 0, Math.PI*2); ctx.stroke();
    }

    update();
</script>
</body>
</html>
