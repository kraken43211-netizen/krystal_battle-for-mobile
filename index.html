<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crystal Battle - FIXED DMG</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; user-select: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; color: #0ff; font-size: 20px; font-weight: bold; text-shadow: 0 0 10px #0ff; pointer-events: none; }
        #menu, #go { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: #0ff; }
        .hidden { display: none !important; }
        button { background: none; border: 2px solid #0ff; color: #0ff; padding: 15px 40px; margin: 10px; font-size: 18px; cursor: pointer; }
        button:active { background: #0ff; color: #000; }
        .sig { position: absolute; bottom: 5px; right: 5px; color: #555; font-size: 10px; }
        #radar { position: absolute; top: 10px; right: 10px; width: 100px; height: 100px; border: 1px solid #0ff; border-radius: 50%; background: rgba(0,255,255,0.1); }
    </style>
</head>
<body>

<div id="ui" class="hidden">HP: <span id="hp">100</span> | SCORE: <span id="score">0</span></div>

<div id="menu">
    <h1>CRYSTAL BATTLE</h1>
    <button id="start">НАЧАТЬ ИГРУ</button>
    <div class="sig">by Кирилл Пьяничук</div>
</div>

<div id="go" class="hidden">
    <h1 style="color:red">GAME OVER</h1>
    <button onclick="location.reload()">РЕСТАРТ</button>
</div>

<div id="radar" class="hidden"><canvas id="rc" width="100" height="100"></canvas></div>

<canvas id="c"></canvas>

<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const hpEl = document.getElementById('hp');
    const scoreEl = document.getElementById('score');
    const rc = document.getElementById('rc');
    const rctx = rc.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let gameActive = false;
    let player = { x: 1000, y: 1000, hp: 100, r: 20, color: '#0ff', hit: 0 };
    let score = 0;
    let enemies = [];
    let pBullets = [];
    let eBullets = [];
    let worldSize = 2000;

    let joyL = { active: false, sx: 0, sy: 0, x: 0, y: 0, id: -1 };
    let joyR = { active: false, sx: 0, sy: 0, x: 0, y: 0, id: -1, a: 0 };

    window.addEventListener('touchstart', e => {
        for(let t of e.changedTouches) {
            if(t.clientX < canvas.width/2 && joyL.id === -1) {
                joyL.active = true; joyL.sx = t.clientX; joyL.sy = t.clientY; joyL.id = t.identifier;
            } else if(joyR.id === -1) {
                joyR.active = true; joyR.sx = t.clientX; joyR.sy = t.clientY; joyR.id = t.identifier;
            }
        }
    });

    window.addEventListener('touchmove', e => {
        for(let t of e.changedTouches) {
            if(t.identifier === joyL.id) { joyL.x = t.clientX - joyL.sx; joyL.y = t.clientY - joyL.sy; }
            if(t.identifier === joyR.id) { 
                joyR.x = t.clientX - joyR.sx; joyR.y = t.clientY - joyR.sy; 
                joyR.a = Math.atan2(joyR.y, joyR.x);
            }
        }
    });

    window.addEventListener('touchend', e => {
        for(let t of e.changedTouches) {
            if(t.identifier === joyL.id) { joyL.active = false; joyL.id = -1; joyL.x = 0; joyL.y = 0; }
            if(t.identifier === joyR.id) { joyR.active = false; joyR.id = -1; joyR.x = 0; joyR.y = 0; }
        }
    });

    function spawn() {
        if(!gameActive) return;
        let a = Math.random() * Math.PI * 2;
        let d = 500 + Math.random() * 200;
        enemies.push({
            x: player.x + Math.cos(a) * d,
            y: player.y + Math.sin(a) * d,
            hp: 30,
            lastShot: 0
        });
    }
    setInterval(spawn, 1500);

    function loop() {
        if(!gameActive) return;

        // Движение игрока
        if(joyL.active) {
            let dist = Math.hypot(joyL.x, joyL.y);
            if(dist > 5) {
                player.x += (joyL.x / dist) * 5;
                player.y += (joyL.y / dist) * 5;
            }
        }

        // Ограничение мира
        player.x = Math.max(20, Math.min(worldSize - 20, player.x));
        player.y = Math.max(20, Math.min(worldSize - 20, player.y));

        // Стрельба игрока
        if(joyR.active && Math.random() > 0.8) {
            pBullets.push({ x: player.x, y: player.y, vx: Math.cos(joyR.a)*10, vy: Math.sin(joyR.a)*10 });
        }

        // Логика врагов
        enemies.forEach((en, i) => {
            let d = Math.hypot(player.x - en.x, player.y - en.y);
            
            // Движение к игроку
            en.x += ((player.x - en.x) / d) * 2;
            en.y += ((player.y - en.y) / d) * 2;

            // Стрельба врага
            if(Date.now() - en.lastShot > 1500 && d < 600) {
                eBullets.push({ x: en.x, y: en.y, vx: ((player.x - en.x)/d)*6, vy: ((player.y - en.y)/d)*6 });
                en.lastShot = Date.now();
            }

            // Игрок попадает во врага
            pBullets.forEach((pb, pbi) => {
                if(Math.hypot(pb.x - en.x, pb.y - en.y) < 25) {
                    enemies.splice(i, 1);
                    pBullets.splice(pbi, 1);
                    score += 10;
                    scoreEl.innerText = score;
                }
            });
        });

        // ПРОВЕРКА УРОНА ПО ИГРОКУ (ЖЕСТКАЯ)
        eBullets.forEach((eb, i) => {
            eb.x += eb.vx; eb.y += eb.vy;
            
            let distToPlayer = Math.hypot(eb.x - player.x, eb.y - player.y);
            if(distToPlayer < player.r) {
                player.hp -= 10;
                player.hit = 10; // Эффект покраснения
                eBullets.splice(i, 1);
                hpEl.innerText = player.hp;
                
                if(player.hp <= 0) {
                    gameActive = false;
                    document.getElementById('go').classList.remove('hidden');
                }
            }

            // Удаление пуль за экраном
            if(Math.abs(eb.x - player.x) > 1000 || Math.abs(eb.y - player.y) > 1000) eBullets.splice(i, 1);
        });

        pBullets.forEach((pb, i) => {
            pb.x += pb.vx; pb.y += pb.vy;
            if(Math.abs(pb.x - player.x) > 1000 || Math.abs(pb.y - player.y) > 1000) pBullets.splice(i, 1);
        });

        draw();
        requestAnimationFrame(loop);
    }

    function draw() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(-player.x + canvas.width/2, -player.y + canvas.height/2);

        // Границы мира
        ctx.strokeStyle = '#333';
        ctx.strokeRect(0, 0, worldSize, worldSize);

        // Игрок
        ctx.fillStyle = player.hit > 0 ? 'red' : '#0ff';
        if(player.hit > 0) player.hit--;
        ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2); ctx.fill();
        
        // Дуло пушки
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.moveTo(player.x, player.y);
        ctx.lineTo(player.x + Math.cos(joyR.a)*35, player.y + Math.sin(joyR.a)*35);
        ctx.stroke();

        // Враги
        ctx.fillStyle = '#f0f';
        enemies.forEach(en => {
            ctx.beginPath(); ctx.arc(en.x, en.y, 15, 0, Math.PI*2); ctx.fill();
        });

        // Пули
        ctx.fillStyle = '#fff'; pBullets.forEach(b => ctx.fillRect(b.x-2, b.y-2, 5, 5));
        ctx.fillStyle = '#f00'; eBullets.forEach(b => ctx.fillRect(b.x-3, b.y-3, 8, 8));

        ctx.restore();

        // Радар
        drawRadar();

        // Джойстики
        if(joyL.active) drawJoy(joyL.sx, joyL.sy, joyL.x, joyL.y);
        if(joyR.active) drawJoy(joyR.sx, joyR.sy, joyR.x, joyR.y);
    }

    function drawJoy(sx, sy, x, y) {
        ctx.strokeStyle = 'rgba(0,255,255,0.3)';
        ctx.beginPath(); ctx.arc(sx, sy, 50, 0, Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.arc(sx+x, sy+y, 20, 0, Math.PI*2); ctx.stroke();
    }

    function drawRadar() {
        rctx.clearRect(0,0,100,100);
        let s = 100/worldSize;
        rctx.fillStyle = '#0ff'; rctx.fillRect(player.x*s-2, player.y*s-2, 4, 4);
        rctx.fillStyle = '#f0f'; enemies.forEach(en => rctx.fillRect(en.x*s-1, en.y*s-1, 2, 2));
    }

    document.getElementById('start').onclick = () => {
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('ui').classList.remove('hidden');
        document.getElementById('radar').classList.remove('hidden');
        gameActive = true;
        loop();
    };
</script>
</body>
</html>
